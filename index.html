<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家宝 & 宝宝 | 尺素寸心</title>
    <style>
        /* === 国风配色系统 === */
        :root {
            --paper-bg: #f6f4ec; /* 宣纸白 */
            --ink-black: #2b2b2b; /* 浓墨 */
            --ink-gray: #707070; /* 淡墨 */
            --cinnabar: #a7322e; /* 朱砂红 */
            --border-color: #e3dccb; /* 旧纸边缘 */
            --active-bg: rgba(167, 50, 46, 0.05); /* 朱砂淡晕染 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            /* 优先调用衬线字体展现古风 */
            font-family: 'KaiTi', 'STKaiti', 'Noto Serif SC', 'Songti SC', serif;
            background-color: var(--paper-bg);
            /* 叠加一层极淡的水墨晕染渐变 */
            background-image: radial-gradient(circle at 80% 20%, rgba(0,0,0,0.02) 0%, transparent 40%),
                              radial-gradient(circle at 20% 80%, rgba(0,0,0,0.02) 0%, transparent 40%);
            color: var(--ink-black);
            height: 100vh;
            display: flex;
            overflow: hidden;
            letter-spacing: 1px;
        }

        /* 左侧书卷留白 */
        .sidebar {
            width: 280px;
            background: transparent;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 40px 30px;
            flex-shrink: 0;
            z-index: 10;
            position: relative;
        }
        
        /* 侧边栏右侧装饰线，模仿卷轴 */
        .sidebar::after {
            content: ''; position: absolute; right: 3px; top: 10%; bottom: 10%;
            width: 1px; background: rgba(0,0,0,0.05);
        }

        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px dashed var(--border-color);
            text-align: center;
        }
        
        .avatar {
            width: 64px; height: 64px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 2px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            background-image: url('m3.jpg'); /* 总头像，记得传到Github同级目录 */
            background-size: cover;
            background-position: center;
            transition: transform 0.5s;
        }
        .avatar:hover { transform: rotate(5deg) scale(1.05); }
        
        .profile-info h3 { 
            font-size: 20px; color: var(--ink-black); font-weight: normal; 
            margin-bottom: 5px; letter-spacing: 2px;
        }
        /* 印章风格的版本号 */
        .seal-stamp {
            display: inline-block; font-size: 10px; color: var(--cinnabar);
            border: 1px solid var(--cinnabar); padding: 2px 4px; border-radius: 2px;
            transform: rotate(-3deg); font-family: 'SimSun', serif; opacity: 0.8;
            margin-top: 5px; letter-spacing: 0;
        }

        .nav-menu { list-style: none; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }
        
        .nav-btn {
            width: 100%; text-align: left; background: transparent; border: none;
            padding: 12px 20px; color: var(--ink-gray); font-size: 16px; 
            cursor: pointer; display: flex; align-items: center;
            transition: all 0.4s ease; font-family: inherit;
            position: relative; border-radius: 4px;
        }
        
        /* 悬浮时的水墨推移效果 */
        .nav-btn:hover { color: var(--ink-black); transform: translateX(5px); }
        
        /* 选中时的朱砂印记 */
        .nav-btn.active { 
            color: var(--cinnabar); font-weight: bold; background: var(--active-bg);
        }
        .nav-btn.active::before {
            content: '引'; position: absolute; left: 0; font-size: 12px; opacity: 0.5;
            font-family: 'SimSun', serif;
        }

        /* 音乐播放器 -> 抚琴区 */
        .music-player { 
            margin-top: auto; padding: 20px 15px; 
            border-top: 1px solid var(--border-color); 
            text-align: center;
        }
        .music-info { 
            font-size: 14px; color: var(--ink-gray); margin-bottom: 15px; 
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .music-controls { display: flex; gap: 10px; justify-content: center; }
        .control-btn { 
            background: transparent; border: 1px solid var(--border-color); 
            color: var(--ink-black); padding: 5px 15px; border-radius: 20px; 
            cursor: pointer; font-size: 12px; transition: all 0.3s; font-family: inherit;
        }
        .control-btn:hover { border-color: var(--ink-black); }
        .control-btn.playing { background: var(--cinnabar); color: #fff; border-color: var(--cinnabar); }
        
        .playing-indicator { 
            display: none; width: 6px; height: 6px; background: var(--cinnabar); 
            border-radius: 50%; animation: breathe 2s infinite; 
        }
        @keyframes breathe { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

        .main-content { flex-grow: 1; position: relative; }
        #app-frame { width: 100%; height: 100%; border: none; display: block; }

        /* 手机端适配 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 15px; flex-direction: row; align-items: center; justify-content: space-between; border-right: none; border-bottom: 1px solid var(--border-color); }
            .sidebar::after { display: none; }
            .profile { margin-bottom: 0; padding-bottom: 0; border: none; flex-direction: row; text-align: left; margin-right: 15px; }
            .avatar { width: 40px; height: 40px; margin-bottom: 0; margin-right: 10px; }
            .profile-info h3 { font-size: 16px; margin-bottom: 0; }
            .seal-stamp { display: none; }
            .nav-menu { flex-direction: row; gap: 10px; overflow-x: auto; white-space: nowrap; padding-bottom: 5px; }
            .nav-btn { padding: 5px 10px; font-size: 14px; }
            .nav-btn.active::before { display: none; }
            .music-player { display: none; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="profile">
            <div class="avatar"></div>
            <div class="profile-info">
                <h3>家宝 & 宝宝</h3>
                <div class="seal-stamp">情长·癸丑</div>
                </div>
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <button class="nav-btn active" onclick="switchTab(this, 'welcome.html')">
                    我们的时空
                </button>
            </li>
            
            <li class="nav-item">
                <button class="nav-btn" onclick="switchTab(this, 'love.html')">
                    百日心盒
                </button>
            </li>

            <li class="nav-item">
                <button class="nav-btn" onclick="switchTab(this, 'talk.html')">
                    尺素寸心 (心里话)
                </button>
            </li>
            
            <li class="nav-item">
                <button class="nav-btn" onclick="switchTab(this, 'impressions.html')">
                    惊鸿照影 (印象集)
                </button>
            </li>

            <li class="nav-item">
                <button class="nav-btn" onclick="switchTab(this, 'travel.html')">
                    山川万里 (旅行)
                </button>
            </li>
        </ul>

        <div class="music-player">
            <div class="music-info">
                <span>🎵 交换余生</span>
                <span class="playing-indicator" id="play-dot"></span>
            </div>
            <div class="music-controls">
                <button class="control-btn" id="play-btn">抚琴</button>
                <button class="control-btn" id="pause-btn">驻音</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <iframe id="app-frame" src="welcome.html" title="App Window"></iframe>
    </main>

    <script>
        function switchTab(btn, url) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const frame = document.getElementById('app-frame');
            frame.style.opacity = 0;
            frame.style.transition = 'opacity 0.6s ease'; // 切换更缓慢优雅
            
            setTimeout(() => {
                frame.src = url;
                frame.onload = () => { frame.style.opacity = 1; };
            }, 400);
        }

        const audio = new Audio('love_story.mp3'); 
        audio.loop = true; audio.volume = 0.6;
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const playDot = document.getElementById('play-dot');

        playBtn.addEventListener('click', () => {
            audio.play().then(() => {
                playDot.style.display = 'inline-block';
                playBtn.classList.add('playing');
                pauseBtn.classList.remove('playing');
            }).catch(e => console.log("需交互"));
        });

        pauseBtn.addEventListener('click', () => {
            audio.pause(); playDot.style.display = 'none';
            pauseBtn.classList.add('playing');
            playBtn.classList.remove('playing');
        });
    </script>
</body>
</html>
