<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journeys & Footprints</title>
    <script src="https://fastly.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/echarts@4.9.0/map/js/china.js"></script>
    <style>
        :root {
            --primary-color: #8ec5fc;
            --secondary-color: #e0c3fc;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --text-main: #444;
        }

        body { margin: 0; min-height: 100vh; background: transparent; font-family: 'PingFang SC', sans-serif; padding: 20px; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }
        .container { max-width: 900px; margin: 0 auto; position: relative; min-height: 80vh; }

        .header { display: flex; align-items: center; margin-bottom: 20px; animation: fadeIn 0.5s; }
        .back-btn { background: #fff; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; color: #666; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-right: 15px; display: none; font-size: 14px; transition: 0.2s; }
        .back-btn:hover { transform: translateX(-3px); color: var(--primary-color); }
        .page-title { font-size: 22px; font-weight: bold; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .view-section { display: none; animation: slideUp 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .view-section.active { display: block; }

        .map-card { background: var(--glass-bg); border-radius: 20px; padding: 15px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); backdrop-filter: blur(10px); }
        .map-title { text-align: center; font-size: 16px; font-weight: bold; color: #666; margin-bottom: 10px; letter-spacing: 2px; }
        #china-map { width: 100%; height: 350px; }

        .trip-card { background: var(--glass-bg); border-radius: 16px; padding: 20px; margin-bottom: 20px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .trip-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .trip-cover { width: 80px; height: 80px; border-radius: 12px; background-size: cover; background-position: center; margin-right: 20px; flex-shrink: 0; border: 2px solid #fff; }
        .trip-info h3 { margin: 0 0 5px 0; font-size: 18px; color: #333; }
        .trip-info p { margin: 0; font-size: 13px; color: #888; }
        .arrow { margin-left: auto; color: #ccc; font-weight: bold; }

        .days-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .day-box { background: rgba(255,255,255,0.9); border-radius: 15px; aspect-ratio: 1/1; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 2px solid transparent; }
        .day-box:hover { transform: scale(1.05); border-color: var(--primary-color); color: var(--primary-color); }
        .day-num { font-size: 24px; font-weight: bold; }
        .day-label { font-size: 12px; color: #999; margin-top: 5px; text-align: center; padding: 0 5px;}

        .detail-card { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .detail-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; border-left: 5px solid var(--secondary-color); padding-left: 15px; color: #333; }
        .detail-desc { font-size: 15px; color: #555; line-height: 1.8; margin-bottom: 30px; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .photo-item { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; cursor: zoom-in; transition: transform 0.3s; background: #eee; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <button class="back-btn" id="backBtn" onclick="goBack()">← 返回</button>
            <div class="page-title" id="pageTitle">我们的旅行</div>
        </div>

        <div id="tripListView" class="view-section active">
            <div class="map-card">
                <div class="map-title">📍 我们的爱情足迹</div>
                <div id="china-map"></div>
            </div>
            <div id="tripListContent"></div>
        </div>

        <div id="daysListView" class="view-section">
            <div class="days-grid" id="daysGrid"></div>
        </div>

        <div id="detailView" class="view-section">
            <div class="detail-card">
                <div class="detail-title" id="detailTitle">标题</div>
                <div class="detail-desc" id="detailDesc">描述内容</div>
                <div class="photo-grid" id="photoGrid"></div>
            </div>
        </div>
    </div>

<script>
    function getPhotos(count) {
        let photos = [];
        for (let i = 1; i <= count; i++) { photos.push(i + '.jpg'); }
        return photos;
    }

    // ===============================================
    // 📍 城市经纬度字典 (已补全北京、福州、漳州)
    // ===============================================
    const CITY_COORDS = {
        '上海': [121.4737, 31.2304],
        '北京': [116.4053, 39.9050],
        '福州': [119.2965, 26.0745],
        '漳州': [117.6618, 24.5108],
        '厦门': [118.0894, 24.4798]
    };

    // ===============================================
    // ✈️ 旅行数据配置中心 (已添加北京和福建行)
    // ===============================================
    const TRIPS = [
        {
            id: 'shanghai2026',
            title: '上海行',
            date: '2026年1月22日 - 1月29日',
            cover: 'SHD1/1.jpg', 
            city: '上海',
            days: [
                { title: '终于见到了', desc: '去了蟠龙新天地和家宝还有叔叔阿姨一起吃了一顿饭。', folder: 'SHD1', photos: getPhotos(5) },
                { title: '迪士尼之旅', desc: '下次进去一定坐极速光轮', folder: 'SHD2', photos: getPhotos(16) },
                { title: '天文馆', desc: '望远镜看月球和木星真清楚', folder: 'SHD3', photos: getPhotos(9) },
                { title: '南京东路外滩', desc: '家宝大摄影师拍的真好看', folder: 'SHD4', photos: getPhotos(9) },
                { title: '背着老爸来约会', desc: '拍拍拍', folder: 'SHD5', photos: getPhotos(9) },
                { title: '叔叔阿姨又请吃饭', desc: '叔叔在家宝不怎么说话...', folder: 'SHD6', photos: getPhotos(3) },
                { title: '淮海路city walk', desc: '怎么拍家宝怎么好看', folder: 'SHD7', photos: getPhotos(18) },
                { title: '离别之际', desc: '时光匆匆但为更好的遇见', folder: 'SHD8', photos: getPhotos(4) }
            ]
        },
        {
            id: 'beijing',
            title: '北京之约',
            date: '待更新',
            cover: 'BJ/1.jpg', 
            city: '北京',
            days: [
                { title: '紫禁城下', desc: '和家宝在故宫红墙下...', folder: 'BJ', photos: getPhotos(1) }
            ]
        },
        {
            id: 'fuzhou',
            title: '福州记忆',
            date: '待更新',
            cover: 'FZ/1.jpg', 
            city: '福州',
            days: [
                { title: '三坊七巷', desc: '逛逛吃吃，福州肉燕真好吃', folder: 'FZ', photos: getPhotos(1) }
            ]
        },
        {
            id: 'zhangzhou',
            title: '漳州时光',
            date: '待更新',
            cover: 'ZZ/1.jpg', 
            city: '漳州',
            days: [
                { title: '古城漫步', desc: '漳州的慢生活，家宝很喜欢', folder: 'ZZ', photos: getPhotos(1) }
            ]
        }
    ];

    let currentLevel = 1; 
    let currentTripIdx = 0;
    const backBtn = document.getElementById('backBtn');
    const pageTitle = document.getElementById('pageTitle');
    const views = { 1: document.getElementById('tripListView'), 2: document.getElementById('daysListView'), 3: document.getElementById('detailView') };

    function init() {
        const listContainer = document.getElementById('tripListContent');
        listContainer.innerHTML = '';
        let mapData = [];
        TRIPS.forEach((trip, index) => {
            const card = document.createElement('div');
            card.className = 'trip-card';
            card.onclick = () => openTrip(index);
            card.innerHTML = `<div class="trip-cover" style="background-image: url('${trip.cover}')"></div><div class="trip-info"><h3>${trip.title}</h3><p>📅 ${trip.date}</p></div><div class="arrow">➜</div>`;
            listContainer.appendChild(card);
            if (trip.city && CITY_COORDS[trip.city]) {
                mapData.push({ name: trip.city, value: [...CITY_COORDS[trip.city], 100] });
            }
        });
        renderMap(mapData);
    }

    function renderMap(mapData) {
        const myChart = echarts.init(document.getElementById('china-map'));
        myChart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}' },
            geo: { map: 'china', roam: true, zoom: 1.2, itemStyle: { normal: { areaColor: 'rgba(255,255,255,0.7)', borderColor: 'rgba(161, 140, 209, 0.4)' }, emphasis: { areaColor: 'rgba(224, 195, 252, 0.5)' } } },
            series: [{ type: 'effectScatter', coordinateSystem: 'geo', data: mapData, symbolSize: 12, showEffectOn: 'render', rippleEffect: { brushType: 'stroke', scale: 4 }, label: { normal: { formatter: '{b}', position: 'right', show: true, color: '#ff9a9e', fontWeight: 'bold' } }, itemStyle: { normal: { color: '#ff9a9e', shadowBlur: 10, shadowColor: '#ff9a9e' } }, zlevel: 1 }]
        });
    }

    function openTrip(index) {
        currentTripIdx = index;
        const trip = TRIPS[index];
        const grid = document.getElementById('daysGrid');
        grid.innerHTML = '';
        trip.days.forEach((dayData, dayIdx) => {
            const box = document.createElement('div');
            box.className = 'day-box';
            box.onclick = () => openDayDetail(dayIdx);
            box.innerHTML = `<div class="day-num">DAY ${dayIdx + 1}</div><div class="day-label">${dayData.title}</div>`;
            grid.appendChild(box);
        });
        pageTitle.innerText = trip.title; 
        switchView(2);
    }

    function openDayDetail(dayIdx) {
        const dayData = TRIPS[currentTripIdx].days[dayIdx];
        document.getElementById('detailTitle').innerText = `Day ${dayIdx + 1}: ${dayData.title}`;
        document.getElementById('detailDesc').innerText = dayData.desc;
        const photoGrid = document.getElementById('photoGrid');
        photoGrid.innerHTML = '';
        if (dayData.photos && dayData.photos.length > 0) {
            dayData.photos.forEach(photoName => {
                const img = document.createElement('img');
                img.className = 'photo-item';
                img.src = `${dayData.folder}/${photoName}`; 
                img.onclick = () => window.open(img.src);
                photoGrid.appendChild(img);
            });
        }
        switchView(3);
    }

    function switchView(level) {
        Object.values(views).forEach(el => el.classList.remove('active'));
        views[level].classList.add('active');
        currentLevel = level;
        if (level === 1) { backBtn.style.display = 'none'; pageTitle.innerText = '我们的旅行'; } 
        else { backBtn.style.display = 'block'; }
    }

    function goBack() {
        if (currentLevel === 3) { pageTitle.innerText = TRIPS[currentTripIdx].title; switchView(2); } 
        else if (currentLevel === 2) { switchView(1); }
    }

    init();
</script>
</body>
</html>
