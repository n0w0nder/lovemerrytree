<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Space - 聘书版</title>
    <style>
        /* === 聘书配色系统 === */
        :root {
            --ink-black: #2b2b2b; /* 浓墨 */
            --ink-gray: #707070; /* 淡墨 */
            --cinnabar: #a7322e; /* 朱砂红 - 增加使用比例 */
            --border-color: #d4ccb8; /* 古朴边框 */
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'KaiTi', 'STKaiti', 'Noto Serif SC', 'Songti SC', serif;
            background: transparent; 
            color: var(--ink-black);
            overflow: hidden;
            padding: 20px;
        }

        /* 主卡片：聘书外框 */
        .main-card {
            background: rgba(255, 255, 255, 0.6);
            padding: 60px 50px;
            border: 1px solid var(--border-color);
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 800px;
            animation: fadeIn 1.5s ease-out;
            box-shadow: 0 10px 30px rgba(167, 50, 46, 0.05); /* 淡淡的红色阴影 */
        }
        
        /* 聘书四角朱砂护角 */
        .corner { position: absolute; width: 40px; height: 40px; border: 3px solid var(--cinnabar); opacity: 0.8; }
        .corner-tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .corner-tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .corner-br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        /* 顶部区域 */
        .header-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .person { text-align: center; width: 120px; }
        
        /* 红色印章 */
        .zodiac-stamp {
            width: 55px; height: 55px;
            border: 2px solid var(--cinnabar);
            border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 15px auto;
            font-size: 24px;
            color: var(--cinnabar);
            font-weight: bold;
            transform: rotate(-4deg);
            background: rgba(167, 50, 46, 0.05); /* 印章底色微红 */
            transition: transform 0.4s;
        }
        .female .zodiac-stamp { transform: rotate(4deg); }
        .person:hover .zodiac-stamp { transform: scale(1.1) rotate(0); }

        .name { font-size: 22px; margin-bottom: 5px; letter-spacing: 4px; font-weight: bold; color: var(--cinnabar); }
        .zodiac-name { font-size: 12px; color: var(--ink-gray); letter-spacing: 2px; }

        /* 中间红线牵系印章 */
        .heart-divider {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; width: 200px;
        }
        .red-line { flex-grow: 1; height: 1px; background: var(--cinnabar); opacity: 0.5; }
        .seal-text {
            background: var(--cinnabar); color: #fff; padding: 6px 10px;
            font-size: 16px; font-family: 'SimSun', serif; letter-spacing: 2px;
            border-radius: 3px; box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }

        /* 计时器区域 */
        .timer-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-top: 20px;
        }

        /* 计时器红框 */
        .timer-box { 
            flex: 1; 
            transition: transform 0.3s; 
            border: 1px solid rgba(167, 50, 46, 0.2); /* 淡淡的红框 */
            background: linear-gradient(to bottom, rgba(167, 50, 46, 0.06) 0%, transparent 100%); /* 顶部微红晕染 */
            padding: 30px 20px;
            border-radius: 4px;
            position: relative;
        }
        .timer-box:hover { transform: translateY(-3px); border-color: rgba(167, 50, 46, 0.4); }
        
        /* 框顶红线压阵 */
        .timer-box::after {
            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 40%; height: 2px; background: var(--cinnabar);
        }

        .timer-label { font-size: 18px; color: var(--ink-black); margin-bottom: 10px; letter-spacing: 2px; font-weight: bold; }
        .timer-date { font-size: 13px; color: var(--cinnabar); margin-bottom: 20px; opacity: 0.8; letter-spacing: 1px; }
        
        .timer-number {
            font-size: 52px; font-weight: normal;
            font-family: 'Times New Roman', serif;
            color: var(--cinnabar);
            text-shadow: 1px 1px 2px rgba(167, 50, 46, 0.2); /* 数字增加一点立体感 */
        }
        .timer-unit { font-size: 14px; color: var(--ink-gray); margin-left: 5px; }

        @keyframes fadeIn { from { opacity: 0; filter: blur(5px); transform: translateY(10px); } to { opacity: 1; filter: blur(0); transform: translateY(0); } }

        @media (max-width: 768px) {
            .timer-container { flex-direction: column; gap: 30px; }
            .header-section { gap: 10px; flex-direction: row; }
            .heart-divider { width: 80px; }
            .main-card { padding: 40px 20px; border: none; }
            .corner { display: none; } /* 手机端隐藏护角防错位 */
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="header-section">
            <div class="person male">
                <div class="zodiac-stamp">双子</div>
                <div class="name">张亦宸</div>
                <div class="zodiac-name">GEMINI</div>
            </div>

            <div class="heart-divider">
                <div class="red-line"></div>
                <div class="seal-text">良缘</div>
                <div class="red-line"></div>
            </div>

            <div class="person female">
                <div class="zodiac-stamp">巨蟹</div>
                <div class="name">杨沁宜</div>
                <div class="zodiac-name">CANCER</div>
            </div>
        </div>

        <div class="timer-container">
            <div class="timer-box">
                <div class="timer-label">相识之约</div>
                <div class="timer-date">二〇二四年八月二十二日</div>
                <div>
                    <span class="timer-number" id="days-meet">0</span>
                    <span class="timer-unit">日</span>
                </div>
            </div>

            <div class="timer-box">
                <div class="timer-label">相恋之始</div>
                <div class="timer-date">二〇二五年九月十二日</div>
                <div>
                    <span class="timer-number" id="days-love">0</span>
                    <span class="timer-unit">日</span>
                </div>
            </div>
        </div>
    </div>

<script>
    // ==========================================
    // 📅 日期配置 (月份是 0-11，所以 7=8月，8=9月)
    // ==========================================
    const dateMeet = new Date(2024, 7, 22); 
    const dateLove = new Date(2025, 8, 12); 

    function updateTimers() {
        const now = new Date(); 

        const diffMeet = now - dateMeet;
        document.getElementById('days-meet').innerText = Math.floor(diffMeet / (1000 * 60 * 60 * 24));

        const diffLove = now - dateLove;
        document.getElementById('days-love').innerText = Math.floor(diffLove / (1000 * 60 * 60 * 24));
    }

    updateTimers();
    setInterval(updateTimers, 1000 * 60 * 60); 
</script>
</body>
</html>
