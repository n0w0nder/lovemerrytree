<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Space - 国风版</title>
    <style>
        /* === 继承主页的国风配色 === */
        :root {
            --ink-black: #2b2b2b; /* 浓墨 */
            --ink-gray: #707070; /* 淡墨 */
            --cinnabar: #a7322e; /* 朱砂红 */
            --border-color: #d4ccb8; /* 古朴边框 */
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 字体调用宋体/楷体 */
            font-family: 'KaiTi', 'STKaiti', 'Noto Serif SC', 'Songti SC', serif;
            background: transparent; /* 透出 index 的宣纸底色 */
            color: var(--ink-black);
            overflow: hidden;
            padding: 20px;
        }

        /* 主卡片：改为古朴的线框画卷风格 */
        .main-card {
            background: rgba(255, 255, 255, 0.4);
            padding: 50px;
            border: 1px solid var(--border-color);
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 800px;
            animation: fadeIn 1.5s ease-out;
        }
        
        /* 画卷的四角装饰点 */
        .main-card::before, .main-card::after {
            content: ''; position: absolute; width: 6px; height: 6px;
            background: var(--cinnabar); border-radius: 50%; opacity: 0.6;
        }
        .main-card::before { top: 10px; left: 10px; box-shadow: 668px 0 var(--cinnabar); }
        .main-card::after { bottom: 10px; left: 10px; box-shadow: 668px 0 var(--cinnabar); }

        /* 顶部名字区域 */
        .header-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-bottom: 50px;
        }

        .person { text-align: center; }
        
        /* 朱砂印章风格的星座图标 */
        .zodiac-stamp {
            width: 50px; height: 50px;
            border: 2px solid var(--cinnabar);
            border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 15px auto;
            font-size: 20px;
            color: var(--cinnabar);
            font-weight: bold;
            transform: rotate(-3deg);
            opacity: 0.9;
            transition: transform 0.4s;
        }
        .female .zodiac-stamp { transform: rotate(4deg); }
        .person:hover .zodiac-stamp { transform: scale(1.1) rotate(0); }

        .name { font-size: 22px; margin-bottom: 5px; letter-spacing: 4px; }
        .zodiac-name { font-size: 12px; color: var(--ink-gray); letter-spacing: 2px; }

        /* 中间结缘 */
        .heart-divider {
            font-size: 18px; color: var(--cinnabar); 
            display: flex; flex-direction: column; align-items: center;
            gap: 5px; opacity: 0.8;
        }
        .heart-divider span { font-size: 12px; color: var(--ink-gray); writing-mode: vertical-lr; letter-spacing: 2px; }

        /* 计时器区域 */
        .timer-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            border-top: 1px dashed var(--border-color);
            border-bottom: 1px dashed var(--border-color);
            padding: 30px 0;
            margin-top: 20px;
        }

        .timer-box { flex: 1; transition: transform 0.3s; }
        .timer-box:hover { transform: translateY(-3px); }

        .timer-label { font-size: 18px; color: var(--ink-black); margin-bottom: 10px; letter-spacing: 2px; }
        .timer-date { font-size: 13px; color: var(--ink-gray); margin-bottom: 20px; font-family: sans-serif; letter-spacing: 1px; }
        
        .timer-number {
            font-size: 46px; font-weight: normal;
            font-family: 'Times New Roman', serif; /* 衬线数字更有韵味 */
            color: var(--cinnabar);
        }
        .timer-unit { font-size: 14px; color: var(--ink-gray); margin-left: 5px; }

        /* 底部标语 */
        .footer-quote {
            margin-top: 40px;
            font-size: 15px;
            color: var(--ink-gray);
            letter-spacing: 3px;
        }

        @keyframes fadeIn { from { opacity: 0; filter: blur(5px); transform: translateY(10px); } to { opacity: 1; filter: blur(0); transform: translateY(0); } }

        @media (max-width: 768px) {
            .timer-container { flex-direction: column; gap: 30px; }
            .header-section { gap: 20px; }
            .main-card { padding: 40px 20px; border: none; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
            .main-card::before, .main-card::after { display: none; }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="header-section">
            <div class="person male">
                <div class="zodiac-stamp">双子</div> <div class="name">张亦宸</div>
                <div class="zodiac-name">GEMINI</div>
            </div>

            <div class="heart-divider">
                <span>结缘</span>
                <div style="font-size: 8px;">●</div>
            </div>

            <div class="person female">
                <div class="zodiac-stamp">巨蟹</div> <div class="name">杨沁宜</div>
                <div class="zodiac-name">CANCER</div>
            </div>
        </div>

        <div class="timer-container">
            <div class="timer-box">
                <div class="timer-label">相识之约</div>
                <div class="timer-date">二〇二四年八月二十二日</div>
                <div>
                    <span class="timer-number" id="days-meet">0</span>
                    <span class="timer-unit">日</span>
                </div>
            </div>

            <div class="timer-box">
                <div class="timer-label">相恋之始</div>
                <div class="timer-date">二〇二五年九月十二日</div>
                <div>
                    <span class="timer-number" id="days-love">0</span>
                    <span class="timer-unit">日</span>
                </div>
            </div>
        </div>

        <div class="footer-quote">
            风水相逢，宇宙温柔
        </div>
    </div>

<script>
    // ==========================================
    // 📅 日期配置 (月份是 0-11，所以 7=8月，8=9月)
    // ==========================================
    const dateMeet = new Date(2024, 7, 22); 
    const dateLove = new Date(2025, 8, 12); 

    function updateTimers() {
        const now = new Date(); 

        const diffMeet = now - dateMeet;
        document.getElementById('days-meet').innerText = Math.floor(diffMeet / (1000 * 60 * 60 * 24));

        const diffLove = now - dateLove;
        document.getElementById('days-love').innerText = Math.floor(diffLove / (1000 * 60 * 60 * 24));
    }

    updateTimers();
    setInterval(updateTimers, 1000 * 60 * 60); 
</script>
</body>
</html>
